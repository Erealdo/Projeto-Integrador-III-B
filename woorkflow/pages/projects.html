<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>WoorkFlow — Projetos</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/base.css"/>
  <link rel="stylesheet" href="../css/layout.css"/>
  <style>
    .projects-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;}
    .project-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:box-shadow .15s;}
    .project-card:hover{box-shadow:var(--shadow);}
    .project-card-top{height:6px;}
    .project-card-body{padding:16px;}
    .project-card-name{font-size:.95rem;font-weight:600;margin-bottom:4px;}
    .project-card-desc{font-size:.8rem;color:var(--muted);margin-bottom:12px;line-height:1.4;min-height:32px;}
    .project-card-meta{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
    .project-card-deadline{font-size:.75rem;color:var(--muted);}
    .progress-bar{height:5px;background:var(--border);border-radius:99px;margin-bottom:8px;}
    .progress-fill{height:100%;border-radius:99px;}
    .project-card-footer{display:flex;align-items:center;justify-content:space-between;font-size:.8rem;color:var(--muted);}
    .project-card-actions{display:flex;gap:4px;}
    .color-options{display:flex;gap:8px;flex-wrap:wrap;}
    .color-opt{width:26px;height:26px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .15s;}
    .color-opt:hover{transform:scale(1.15);}
    .color-opt.selected{border-color:var(--text);}
    .btn-icon svg{width:15px;height:15px;}
  </style>
</head>
<body>
<div class="app-shell">
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div style="font-size:1.15rem;font-weight:700;letter-spacing:-.3px">Woork<span style="color:var(--accent)">Flow</span></div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section-label">Principal</div>
      <div class="nav-item " onclick="location.href='dashboard.html'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
        Dashboard
      </div>
      <div class="nav-item active" onclick="location.href='projects.html'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M3 7a2 2 0 012-2h4l2 2h8a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V7z"/></svg>
        Projetos
      </div>
      <div class="nav-item " onclick="location.href='kanban.html'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M9 17V7m0 10a2 2 0 01-2 2H5a2 2 0 01-2-2V7a2 2 0 012-2h2a2 2 0 012 2m0 10a2 2 0 002 2h2a2 2 0 002-2M9 7a2 2 0 012-2h2a2 2 0 012 2m0 10V7m0 10a2 2 0 002 2h2a2 2 0 002-2V7a2 2 0 00-2-2h-2a2 2 0 00-2 2"/></svg>
        Kanban
      </div>
      <div class="nav-item " onclick="location.href='calendar.html'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
        Calendário
      </div>
    </nav>
    <div class="sidebar-user">
      <div class="user-avatar" id="sidebar-avatar">--</div>
      <div class="user-info">
        <div class="user-name" id="sidebar-name">—</div>
        <div class="user-email" id="sidebar-email">—</div>
      </div>
      <button class="btn-logout" onclick="doLogout()" title="Sair">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
      </button>
    </div>
  </aside>
  <div class="sidebar-overlay"></div>
  <div class="main-content">
    <header class="top-header">
      <button class="btn-menu" id="btnMenu">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/></svg>
      </button>
      <span class="header-title">Projetos</span>
      <div class="header-actions">
        <button class="btn btn-primary btn-sm" onclick="openNewProject()">+ Novo projeto</button>
      </div>
    </header>
    <main class="page-area">
      <div class="page-header"><div><h2>Meus Projetos</h2><p>Crie e gerencie seus projetos.</p></div></div>
      <div class="projects-grid" id="projectsGrid"><div style="text-align:center;padding:40px;color:var(--muted)">Carregando…</div></div>
    </main>
  </div>
</div>
<div class="modal-overlay hidden" id="modalProject">
  <div class="modal">
    <div class="modal-header"><h3 id="modalProjectTitle">Novo Projeto</h3><button class="btn-icon" onclick="closeModal('modalProject')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg></button></div>
    <div class="modal-body">
      <input type="hidden" id="editProjectId"/>
      <div class="field"><label>Nome *</label><input type="text" id="projName" placeholder="Ex: Site institucional"/></div>
      <div class="field"><label>Descrição</label><textarea id="projDesc" placeholder="Objetivo do projeto…"></textarea></div>
      <div class="field"><label>Prazo</label><input type="date" id="projDeadline"/></div>
      <div class="field"><label>Cor</label><div class="color-options" id="colorOptions"></div></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('modalProject')">Cancelar</button>
      <button class="btn btn-primary" id="saveProjectBtn" onclick="saveProject()"><span class="btn-text">Salvar</span><div class="spinner"></div></button>
    </div>
  </div>
</div>
<div class="modal-overlay hidden" id="modalDelete">
  <div class="modal">
    <div class="modal-header"><h3>Excluir projeto</h3><button class="btn-icon" onclick="closeModal('modalDelete')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg></button></div>
    <div class="modal-body"><p style="font-size:.9rem">Excluir <strong id="deleteProjectName"></strong>? Todas as tarefas serão removidas.</p></div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('modalDelete')">Cancelar</button>
      <button class="btn btn-danger" onclick="confirmDelete()">Excluir</button>
    </div>
  </div>
</div>
<div id="toast-container"></div>
<script src="../js/api.js"></script>
<script src="../js/ui.js"></script>
<script>
  if (!isLoggedIn()) window.location.href = '../index.html';
  const user = getUser();
  document.getElementById('sidebar-name').textContent  = user?.name  || '—';
  document.getElementById('sidebar-email').textContent = user?.email || '—';
  document.getElementById('sidebar-avatar').textContent = user?.avatar || '';
  function doLogout(){ clearSession(); window.location.href='../index.html'; }
  document.getElementById('btnMenu').addEventListener('click',()=>{document.querySelector('.sidebar').classList.toggle('open');document.querySelector('.sidebar-overlay').classList.toggle('show');});
  document.querySelector('.sidebar-overlay').addEventListener('click',()=>{document.querySelector('.sidebar').classList.remove('open');document.querySelector('.sidebar-overlay').classList.remove('show');});
  const COLORS = ['#2563eb','#16a34a','#d97706','#dc2626','#7c3aed','#0891b2','#db2777','#374151'];
  let selectedColor = COLORS[0], deleteTargetId = null, allProjects = [];
  COLORS.forEach((c,i) => {
    const div = document.createElement('div');
    div.className = 'color-opt' + (i===0?' selected':'');
    div.style.background = c;
    div.onclick = () => { selectedColor=c; document.querySelectorAll('.color-opt').forEach(e=>e.classList.remove('selected')); div.classList.add('selected'); };
    document.getElementById('colorOptions').appendChild(div);
  });
  function fmtDate(d){ if(!d)return'Sem prazo'; return new Date(d).toLocaleDateString('pt-BR'); }
  function closeModal(id){ document.getElementById(id).classList.add('hidden'); }
  document.querySelectorAll('.modal-overlay').forEach(el=>el.addEventListener('click',e=>{ if(e.target===el)el.classList.add('hidden'); }));
  function showToast(msg,type='default'){ let c=document.getElementById('toast-container'); const t=document.createElement('div'); t.className=`toast ${type}`; t.textContent=msg; c.appendChild(t); setTimeout(()=>{t.style.opacity='0';t.style.transition='opacity .3s';setTimeout(()=>t.remove(),300);},2500); }
  async function loadProjects(){
    const res = await getProjects();
    allProjects = res.ok ? res.data.projects : [];
    const grid = document.getElementById('projectsGrid');
    if (!allProjects.length) { grid.innerHTML='<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--muted)">Nenhum projeto ainda. Crie o primeiro!</div>'; return; }
    grid.innerHTML = allProjects.map(p => {
      const pct = p.task_count ? Math.round((p.done_count/p.task_count)*100) : 0;
      return `<div class="project-card">
        <div class="project-card-top" style="background:${p.color}"></div>
        <div class="project-card-body">
          <div class="project-card-name">${p.name}</div>
          <div class="project-card-desc">${p.description||'<em>Sem descrição</em>'}</div>
          <div class="project-card-meta">
            <span class="project-card-deadline">Prazo: ${fmtDate(p.deadline)}</span>
            <span style="font-size:.8rem;color:var(--muted)">${p.task_count||0} tarefa(s)</span>
          </div>
          <div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:${p.color}"></div></div>
          <div class="project-card-footer">
            <span>${pct}% concluído</span>
            <div class="project-card-actions">
              <button class="btn btn-secondary btn-sm" onclick="event.stopPropagation();location.href='kanban.html?project=${p.id}'">Kanban</button>
              <button class="btn-icon" onclick="event.stopPropagation();editProject(${p.id})" title="Editar"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg></button>
              <button class="btn-icon" onclick="event.stopPropagation();askDelete(${p.id},'${p.name.replace(/'/g,"\'")}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg></button>
            </div>
          </div>
        </div>
      </div>`;
    }).join('');
  }
  function openNewProject(){ document.getElementById('modalProjectTitle').textContent='Novo Projeto'; document.getElementById('editProjectId').value=''; document.getElementById('projName').value=''; document.getElementById('projDesc').value=''; document.getElementById('projDeadline').value=''; selectedColor=COLORS[0]; document.querySelectorAll('.color-opt').forEach((el,i)=>el.classList.toggle('selected',i===0)); document.getElementById('modalProject').classList.remove('hidden'); }
  function editProject(id){ const p=allProjects.find(p=>p.id===id); if(!p)return; document.getElementById('modalProjectTitle').textContent='Editar Projeto'; document.getElementById('editProjectId').value=p.id; document.getElementById('projName').value=p.name; document.getElementById('projDesc').value=p.description||''; document.getElementById('projDeadline').value=p.deadline?p.deadline.slice(0,10):''; selectedColor=p.color; document.getElementById('modalProject').classList.remove('hidden'); }
  async function saveProject(){ const name=document.getElementById('projName').value.trim(); const desc=document.getElementById('projDesc').value.trim(); const deadline=document.getElementById('projDeadline').value; const editId=document.getElementById('editProjectId').value; if(!name)return showToast('Informe o nome.','error'); const btn=document.getElementById('saveProjectBtn'); btn.classList.add('loading');btn.disabled=true; const payload={name,description:desc,color:selectedColor,deadline:deadline||null}; const res=editId?await updateProject(Number(editId),payload):await createProject(payload); btn.classList.remove('loading');btn.disabled=false; if(!res.ok)return showToast(res.data.error||'Erro.','error'); showToast(editId?'Projeto atualizado!':'Projeto criado!','success'); closeModal('modalProject'); loadProjects(); }
  function askDelete(id,name){ deleteTargetId=id; document.getElementById('deleteProjectName').textContent=name; document.getElementById('modalDelete').classList.remove('hidden'); }
  async function confirmDelete(){ await deleteProject(deleteTargetId); closeModal('modalDelete'); showToast('Projeto excluído.','error'); loadProjects(); }
  loadProjects();
</script>
</body>
</html>
