<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>WoorkFlow — Kanban</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/base.css"/>
  <link rel="stylesheet" href="../css/layout.css"/>
  <link rel="stylesheet" href="../css/kanban.css"/>
  <style>
    .project-selector{display:flex;align-items:center;gap:10px;margin-bottom:20px;}
    .project-selector label{font-size:.875rem;font-weight:500;}
    .project-selector select{padding:7px 12px;border:1px solid var(--border);border-radius:var(--radius);font-size:.875rem;background:var(--white);color:var(--text);outline:none;}
    .btn-icon svg{width:15px;height:15px;}
  </style>
</head>
<body>
<div class="app-shell">
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div style="font-size:1.15rem;font-weight:700;letter-spacing:-.3px">Woork<span style="color:var(--accent)">Flow</span></div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section-label">Principal</div>
      <div class="nav-item " onclick="location.href='dashboard.html'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
        Dashboard
      </div>
      <div class="nav-item " onclick="location.href='projects.html'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M3 7a2 2 0 012-2h4l2 2h8a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V7z"/></svg>
        Projetos
      </div>
      <div class="nav-item active" onclick="location.href='kanban.html'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M9 17V7m0 10a2 2 0 01-2 2H5a2 2 0 01-2-2V7a2 2 0 012-2h2a2 2 0 012 2m0 10a2 2 0 002 2h2a2 2 0 002-2M9 7a2 2 0 012-2h2a2 2 0 012 2m0 10V7m0 10a2 2 0 002 2h2a2 2 0 002-2V7a2 2 0 00-2-2h-2a2 2 0 00-2 2"/></svg>
        Kanban
      </div>
      <div class="nav-item " onclick="location.href='calendar.html'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
        Calendário
      </div>
    </nav>
    <div class="sidebar-user">
      <div class="user-avatar" id="sidebar-avatar">--</div>
      <div class="user-info">
        <div class="user-name" id="sidebar-name">—</div>
        <div class="user-email" id="sidebar-email">—</div>
      </div>
      <button class="btn-logout" onclick="doLogout()" title="Sair">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
      </button>
    </div>
  </aside>
  <div class="sidebar-overlay"></div>
  <div class="main-content">
    <header class="top-header">
      <button class="btn-menu" id="btnMenu">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/></svg>
      </button>
      <span class="header-title">Quadro Kanban</span>
      <div class="header-actions">
        <button class="btn btn-primary btn-sm" onclick="openNewTask()">+ Nova tarefa</button>
      </div>
    </header>
    <main class="page-area">
      <div class="project-selector">
        <label>Projeto:</label>
        <select id="projectSelect" onchange="onProjectChange()"><option value="">Selecione um projeto</option></select>
      </div>
      <div id="noProjectMsg" style="text-align:center;padding:60px 20px;color:var(--muted)">
        <div style="font-size:2.5rem;margin-bottom:12px">&#9776;</div>
        <div style="font-weight:600;margin-bottom:8px">Selecione um projeto</div>
        <div style="font-size:.875rem">ou <a href="projects.html">crie um novo projeto</a> para começar.</div>
      </div>
      <div class="kanban-board" id="kanbanBoard" style="display:none"></div>
    </main>
  </div>
</div>
<div class="modal-overlay hidden" id="modalTask">
  <div class="modal">
    <div class="modal-header"><h3 id="modalTaskTitle">Nova Tarefa</h3><button class="btn-icon" onclick="closeModal('modalTask')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg></button></div>
    <div class="modal-body">
      <input type="hidden" id="editTaskId"/>
      <div class="field"><label>Título *</label><input type="text" id="taskTitle" placeholder="Ex: Criar wireframes"/></div>
      <div class="field"><label>Descrição</label><textarea id="taskDesc" placeholder="Detalhes da tarefa…"></textarea></div>
      <div class="field-row">
        <div class="field"><label>Prioridade</label><select id="taskPriority"><option value="baixa">Baixa</option><option value="media" selected>Média</option><option value="alta">Alta</option></select></div>
        <div class="field"><label>Status</label><select id="taskStatus"><option value="todo">A fazer</option><option value="doing">Em andamento</option><option value="done">Concluído</option></select></div>
      </div>
      <div class="field"><label>Prazo</label><input type="date" id="taskDeadline"/></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('modalTask')">Cancelar</button>
      <button class="btn btn-primary" id="saveTaskBtn" onclick="saveTask()"><span class="btn-text">Salvar</span><div class="spinner"></div></button>
    </div>
  </div>
</div>
<div id="toast-container"></div>
<script src="../js/api.js"></script>
<script>
  if (!isLoggedIn()) window.location.href = '../index.html';
  const user = getUser();
  document.getElementById('sidebar-name').textContent  = user?.name  || '—';
  document.getElementById('sidebar-email').textContent = user?.email || '—';
  document.getElementById('sidebar-avatar').textContent = user?.avatar || '';
  function doLogout(){ clearSession(); window.location.href='../index.html'; }
  document.getElementById('btnMenu').addEventListener('click',()=>{document.querySelector('.sidebar').classList.toggle('open');document.querySelector('.sidebar-overlay').classList.toggle('show');});
  document.querySelector('.sidebar-overlay').addEventListener('click',()=>{document.querySelector('.sidebar').classList.remove('open');document.querySelector('.sidebar-overlay').classList.remove('show');});
  const COLS=[{id:'todo',label:'A fazer',dotClass:'todo'},{id:'doing',label:'Em andamento',dotClass:'doing'},{id:'done',label:'Concluído',dotClass:'done'}];
  let currentProjectId=null,allTasks=[],dragTaskId=null;
  function statusLabel(s){return{todo:'A fazer',doing:'Em andamento',done:'Concluído'}[s]||s;}
  function priorityLabel(p){return{alta:'Alta',media:'Média',baixa:'Baixa'}[p]||p;}
  function priorityClass(p){return{alta:'priority-alta',media:'priority-media',baixa:'priority-baixa'}[p]||'';}
  function fmtDateShort(d){if(!d)return'';return new Date(d).toLocaleDateString('pt-BR',{day:'2-digit',month:'short'});}
  function isOverdue(d){return d&&new Date(d)<new Date();}
  function closeModal(id){document.getElementById(id).classList.add('hidden');}
  document.querySelectorAll('.modal-overlay').forEach(el=>el.addEventListener('click',e=>{if(e.target===el)el.classList.add('hidden')}));
  function showToast(msg,type='default'){let c=document.getElementById('toast-container');const t=document.createElement('div');t.className=`toast ${type}`;t.textContent=msg;c.appendChild(t);setTimeout(()=>{t.style.opacity='0';t.style.transition='opacity .3s';setTimeout(()=>t.remove(),300);},2500);}
  async function loadProjects(){
    const res=await getProjects();
    const projects=res.ok?res.data.projects:[];
    const sel=document.getElementById('projectSelect');
    sel.innerHTML='<option value="">Selecione um projeto</option>'+projects.map(p=>`<option value="${p.id}">${p.name}</option>`).join('');
    const params=new URLSearchParams(window.location.search);
    const pid=params.get('project');
    if(pid){sel.value=pid;onProjectChange();}
  }
  async function onProjectChange(){
    const val=document.getElementById('projectSelect').value;
    currentProjectId=val?Number(val):null;
    document.getElementById('noProjectMsg').style.display=currentProjectId?'none':'block';
    document.getElementById('kanbanBoard').style.display=currentProjectId?'flex':'none';
    if(currentProjectId){const res=await getProjectTasks(currentProjectId);allTasks=res.ok?res.data.tasks:[];renderBoard();}
  }
  function renderBoard(){
    const board=document.getElementById('kanbanBoard');
    board.innerHTML=COLS.map(col=>{
      const colTasks=allTasks.filter(t=>t.status===col.id);
      return`<div class="kanban-col" id="col-${col.id}" ondragover="onDragOver(event,'${col.id}')" ondrop="onDrop(event,'${col.id}')" ondragleave="onDragLeave(event)">
        <div class="kanban-col-header"><div class="col-dot ${col.dotClass}"></div><h3>${col.label}</h3><span class="col-count">${colTasks.length}</span></div>
        <div class="kanban-cards" id="cards-${col.id}">${colTasks.map(t=>renderCard(t)).join('')}</div>
        <button class="btn-add-card" onclick="openNewTask('${col.id}')">+ Adicionar tarefa</button>
      </div>`;
    }).join('');
  }
  function renderCard(t){
    const over=t.deadline&&isOverdue(t.deadline)&&t.status!=='done';
    return`<div class="task-card" id="card-${t.id}" draggable="true" ondragstart="onDragStart(event,${t.id})" ondragend="onDragEnd(event)" onclick="viewTask(${t.id})">
      <div class="task-card-actions">
        <button class="btn-icon" onclick="event.stopPropagation();editTask(${t.id})" title="Editar"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg></button>
        <button class="btn-icon" onclick="event.stopPropagation();removeTask(${t.id})" title="Excluir"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg></button>
      </div>
      <div class="task-card-title">${t.title}</div>
      ${t.description?`<div class="task-card-desc">${t.description}</div>`:''}
      <div class="task-card-meta">
        <span class="task-card-priority ${priorityClass(t.priority)}">${priorityLabel(t.priority)}</span>
        ${t.deadline?`<span class="task-card-due ${over?'overdue':''}">${fmtDateShort(t.deadline)}</span>`:''}
      </div>
    </div>`;
  }
  function onDragStart(e,id){dragTaskId=id;setTimeout(()=>document.getElementById('card-'+id)?.classList.add('dragging'),0);e.dataTransfer.effectAllowed='move';}
  function onDragEnd(){document.querySelectorAll('.task-card').forEach(c=>c.classList.remove('dragging'));document.querySelectorAll('.kanban-col').forEach(c=>c.classList.remove('drag-target'));}
  function onDragOver(e,colId){e.preventDefault();document.querySelectorAll('.kanban-col').forEach(c=>c.classList.remove('drag-target'));document.getElementById('col-'+colId)?.classList.add('drag-target');}
  function onDragLeave(e){if(!e.currentTarget.contains(e.relatedTarget))e.currentTarget.classList.remove('drag-target');}
  async function onDrop(e,colId){e.preventDefault();if(!dragTaskId)return;await updateTask(dragTaskId,{...allTasks.find(t=>t.id===dragTaskId),status:colId});dragTaskId=null;document.querySelectorAll('.kanban-col').forEach(c=>c.classList.remove('drag-target'));const res=await getProjectTasks(currentProjectId);allTasks=res.ok?res.data.tasks:[];renderBoard();showToast(`Movida para "${statusLabel(colId)}"`, 'success');}
  function openNewTask(status='todo'){if(!currentProjectId)return showToast('Selecione um projeto.','error');document.getElementById('modalTaskTitle').textContent='Nova Tarefa';document.getElementById('editTaskId').value='';document.getElementById('taskTitle').value='';document.getElementById('taskDesc').value='';document.getElementById('taskPriority').value='media';document.getElementById('taskStatus').value=status;document.getElementById('taskDeadline').value='';document.getElementById('modalTask').classList.remove('hidden');}
  function editTask(id){const t=allTasks.find(t=>t.id===id);if(!t)return;document.getElementById('modalTaskTitle').textContent='Editar Tarefa';document.getElementById('editTaskId').value=t.id;document.getElementById('taskTitle').value=t.title;document.getElementById('taskDesc').value=t.description||'';document.getElementById('taskPriority').value=t.priority;document.getElementById('taskStatus').value=t.status;document.getElementById('taskDeadline').value=t.deadline?t.deadline.slice(0,10):'';document.getElementById('modalTask').classList.remove('hidden');}
  async function saveTask(){const title=document.getElementById('taskTitle').value.trim();const desc=document.getElementById('taskDesc').value.trim();const priority=document.getElementById('taskPriority').value;const status=document.getElementById('taskStatus').value;const deadline=document.getElementById('taskDeadline').value;const editId=document.getElementById('editTaskId').value;if(!title)return showToast('Informe o título.','error');const btn=document.getElementById('saveTaskBtn');btn.classList.add('loading');btn.disabled=true;const payload={project_id:currentProjectId,title,description:desc,priority,status,deadline:deadline||null};const res=editId?await updateTask(Number(editId),payload):await createTask(payload);btn.classList.remove('loading');btn.disabled=false;if(!res.ok)return showToast(res.data.error||'Erro.','error');showToast(editId?'Tarefa atualizada!':'Tarefa criada!','success');closeModal('modalTask');const r=await getProjectTasks(currentProjectId);allTasks=r.ok?r.data.tasks:[];renderBoard();}
  async function removeTask(id){await deleteTask(id);allTasks=allTasks.filter(t=>t.id!==id);renderBoard();showToast('Tarefa excluída.','error');}
  function viewTask(id){const t=allTasks.find(t=>t.id===id);if(!t)return;alert(`${t.title}\n\nStatus: ${statusLabel(t.status)}\nPrioridade: ${priorityLabel(t.priority)}\nPrazo: ${t.deadline?new Date(t.deadline).toLocaleDateString('pt-BR'):'Sem prazo'}\n\n${t.description||'Sem descrição.'}`);}
  loadProjects();
</script>
</body>
</html>
