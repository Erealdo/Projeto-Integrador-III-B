<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>WoorkFlow — Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/base.css"/>
  <link rel="stylesheet" href="../css/layout.css"/>
  <style>
    .stats-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:16px; margin-bottom:24px; }
    .stat-card { background:var(--white); border:1px solid var(--border); border-radius:var(--radius); padding:18px 20px; display:flex; align-items:center; gap:14px; }
    .stat-icon { width:44px; height:44px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:20px; flex-shrink:0; }
    .stat-icon.blue{background:#dbeafe;} .stat-icon.green{background:#dcfce7;} .stat-icon.yellow{background:#fef9c3;} .stat-icon.red{background:#fee2e2;}
    .stat-value { font-size:1.5rem; font-weight:700; line-height:1; }
    .stat-label { font-size:.8rem; color:var(--muted); margin-top:3px; }
    .grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:20px; }
    @media(max-width:700px){.grid-2{grid-template-columns:1fr;}}
    .section-card { background:var(--white); border:1px solid var(--border); border-radius:var(--radius); }
    .section-header { display:flex; align-items:center; justify-content:space-between; padding:14px 18px; border-bottom:1px solid var(--border); }
    .section-header h3 { font-size:.9rem; font-weight:600; }
    .section-body { padding:14px 18px; }
    .task-row { display:flex; align-items:center; gap:10px; padding:9px 0; border-bottom:1px solid var(--border); }
    .task-row:last-child{border-bottom:none;}
    .task-row-title { flex:1; font-size:.875rem; font-weight:500; }
    .task-row-project { font-size:.75rem; color:var(--muted); }
    .project-row { display:flex; align-items:center; gap:12px; padding:10px 0; border-bottom:1px solid var(--border); cursor:pointer; }
    .project-row:last-child{border-bottom:none;}
    .project-color-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
    .project-row-name { flex:1; font-size:.875rem; font-weight:500; }
    .progress-bar { height:4px; background:var(--border); border-radius:99px; margin-top:4px; }
    .progress-fill { height:100%; border-radius:99px; background:var(--accent); }
  </style>
</head>
<body>
<div class="app-shell">
  <aside class="sidebar">
    <div class="sidebar-brand"><div style="font-size:1.15rem;font-weight:700;letter-spacing:-.3px">Woork<span style="color:var(--accent)">Flow</span></div></div>
    <nav class="sidebar-nav">
      <div class="nav-section-label">Principal</div>
      <div class="nav-item active" onclick="location.href='dashboard.html'"><span class="nav-icon">🏠</span> Dashboard</div>
      <div class="nav-item" onclick="location.href='projects.html'"><span class="nav-icon">📁</span> Projetos</div>
      <div class="nav-item" onclick="location.href='kanban.html'"><span class="nav-icon">📋</span> Kanban</div>
      <div class="nav-item" onclick="location.href='calendar.html'"><span class="nav-icon">📅</span> Calendário</div>
    </nav>
    <div class="sidebar-user">
      <div class="user-avatar" id="sidebar-avatar">--</div>
      <div class="user-info">
        <div class="user-name" id="sidebar-name">—</div>
        <div class="user-email" id="sidebar-email">—</div>
      </div>
      <button class="btn-logout" onclick="doLogout()" title="Sair">🚪</button>
    </div>
  </aside>
  <div class="sidebar-overlay"></div>
  <div class="main-content">
    <header class="top-header">
      <button class="btn-menu">☰</button>
      <span class="header-title">Dashboard</span>
      <div class="header-actions">
        <button class="btn btn-primary btn-sm" onclick="location.href='projects.html'">+ Novo projeto</button>
      </div>
    </header>
    <main class="page-area">
      <div class="page-header">
        <div><h2 id="welcomeMsg">Olá! 👋</h2><p>Aqui está o resumo de hoje.</p></div>
      </div>
      <div class="stats-grid">
        <div class="stat-card"><div class="stat-icon blue">📁</div><div><div class="stat-value" id="statProjects">—</div><div class="stat-label">Projetos</div></div></div>
        <div class="stat-card"><div class="stat-icon yellow">📋</div><div><div class="stat-value" id="statTasks">—</div><div class="stat-label">Tarefas totais</div></div></div>
        <div class="stat-card"><div class="stat-icon blue">⏳</div><div><div class="stat-value" id="statDoing">—</div><div class="stat-label">Em andamento</div></div></div>
        <div class="stat-card"><div class="stat-icon green">✅</div><div><div class="stat-value" id="statDone">—</div><div class="stat-label">Concluídas</div></div></div>
        <div class="stat-card"><div class="stat-icon red">⚠️</div><div><div class="stat-value" id="statOverdue">—</div><div class="stat-label">Atrasadas</div></div></div>
      </div>
      <div class="grid-2">
        <div class="section-card">
          <div class="section-header"><h3>Tarefas recentes</h3><button class="btn btn-secondary btn-sm" onclick="location.href='kanban.html'">Ver kanban</button></div>
          <div class="section-body" id="recentTasks"><div style="text-align:center;padding:20px;color:var(--muted)">Carregando…</div></div>
        </div>
        <div class="section-card">
          <div class="section-header"><h3>Projetos ativos</h3><button class="btn btn-secondary btn-sm" onclick="location.href='projects.html'">Ver todos</button></div>
          <div class="section-body" id="activeProjects"><div style="text-align:center;padding:20px;color:var(--muted)">Carregando…</div></div>
        </div>
      </div>
    </main>
  </div>
</div>
<div id="toast-container"></div>
<script src="../js/api.js"></script>
<script src="../js/ui.js"></script>
<script>
  if (!isLoggedIn()) window.location.href = '../index.html';

  const user = getUser();
  document.getElementById('welcomeMsg').textContent   = `Olá, ${user?.name?.split(' ')[0] || ''}! 👋`;
  document.getElementById('sidebar-name').textContent  = user?.name  || '—';
  document.getElementById('sidebar-email').textContent = user?.email || '—';
  document.getElementById('sidebar-avatar').textContent = user?.avatar || makeAvatar(user?.name || '');

  function makeAvatar(n) { const p=n.trim().split(' '); return ((p[0]?.[0]||'')+(p[1]?.[0]||'')).toUpperCase(); }
  function doLogout() { clearSession(); window.location.href='../index.html'; }

  // Mobile sidebar
  document.querySelector('.btn-menu').addEventListener('click', () => {
    document.querySelector('.sidebar').classList.toggle('open');
    document.querySelector('.sidebar-overlay').classList.toggle('show');
  });
  document.querySelector('.sidebar-overlay').addEventListener('click', () => {
    document.querySelector('.sidebar').classList.remove('open');
    document.querySelector('.sidebar-overlay').classList.remove('show');
  });

  function statusLabel(s){ return {todo:'A fazer',doing:'Em andamento',done:'Concluído'}[s]||s; }
  function priorityLabel(p){ return {alta:'Alta',media:'Média',baixa:'Baixa'}[p]||p; }
  function fmtDate(d){ if(!d)return'—'; return new Date(d).toLocaleDateString('pt-BR'); }
  function isOverdue(d){ return d && new Date(d)<new Date(); }

  async function loadDashboard() {
    const [pRes, tRes] = await Promise.all([getProjects(), getUserTasks()]);
    const projects = pRes.ok ? pRes.data.projects : [];
    const tasks    = tRes.ok ? tRes.data.tasks    : [];

    const now = new Date();
    document.getElementById('statProjects').textContent = projects.length;
    document.getElementById('statTasks').textContent    = tasks.length;
    document.getElementById('statDoing').textContent    = tasks.filter(t=>t.status==='doing').length;
    document.getElementById('statDone').textContent     = tasks.filter(t=>t.status==='done').length;
    document.getElementById('statOverdue').textContent  = tasks.filter(t=>t.deadline && new Date(t.deadline)<now && t.status!=='done').length;

    // Recent tasks
    const recent = [...tasks].slice(0,5);
    const tasksEl = document.getElementById('recentTasks');
    tasksEl.innerHTML = recent.length ? recent.map(t=>`
      <div class="task-row">
        <span class="badge ${t.status==='done'?'badge-green':t.status==='doing'?'badge-blue':'badge-gray'}">${statusLabel(t.status)}</span>
        <div style="flex:1"><div class="task-row-title">${t.title}</div><div class="task-row-project">${t.project_name||'—'}</div></div>
        <span style="font-size:.75rem;color:var(--muted)">${priorityLabel(t.priority)}</span>
      </div>`).join('')
    : '<div style="text-align:center;padding:20px;color:var(--muted)">Nenhuma tarefa ainda.</div>';

    // Projects
    const projEl = document.getElementById('activeProjects');
    projEl.innerHTML = projects.length ? projects.slice(0,5).map(p=>{
      const pct = p.task_count ? Math.round((p.done_count/p.task_count)*100) : 0;
      return `<div class="project-row" onclick="location.href='kanban.html?project=${p.id}'">
        <div class="project-color-dot" style="background:${p.color}"></div>
        <div style="flex:1">
          <div class="project-row-name">${p.name}</div>
          <div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:${p.color}"></div></div>
        </div>
        <div style="text-align:right">
          <div style="font-size:.75rem;color:var(--muted)">${fmtDate(p.deadline)}</div>
          <div style="font-size:.75rem;color:var(--muted)">${p.done_count}/${p.task_count}</div>
        </div>
      </div>`;
    }).join('')
    : '<div style="text-align:center;padding:20px;color:var(--muted)">Nenhum projeto ainda.</div>';
  }

  loadDashboard();
</script>
</body>
</html>
